<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FARO XXI – Colombia · Acciones ODSSI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

* { box-sizing: border-box; }
:root{
  --forest:#0E3B2E; --emerald:#15A077; --emerald-deep:#0F7B5C;
  --mint:#E9F5EF; --paper:#F6FAF8; --ink:#0C201B; --ink-soft:#43615A;
  --line:#CFE4DB; --beam:#E8C46B;
}
body{ margin:0; font-family:'Inter',system-ui,sans-serif; color:var(--ink);
  background:var(--paper); -webkit-font-smoothing:antialiased; }
.wrap{ max-width:760px; margin:0 auto; padding:28px 20px 64px; }

.top{ position:relative; overflow:hidden;
  background:linear-gradient(160deg,var(--forest),var(--emerald-deep));
  color:#fff; border-radius:18px; padding:22px 22px 20px; }
.top:before{ content:""; position:absolute; top:-40%; right:-10%; width:340px; height:340px;
  background:radial-gradient(circle at 70% 30%, rgba(232,196,107,.28), transparent 60%); transform:rotate(8deg); }
.brand{ display:flex; align-items:center; gap:10px; position:relative; flex-wrap:wrap; }
.beacon{ width:14px; height:14px; border-radius:50%; background:var(--beam);
  box-shadow:0 0 0 4px rgba(232,196,107,.25), 0 0 22px 4px rgba(232,196,107,.55); }
.brand b{ font-family:'Space Grotesk'; font-weight:700; letter-spacing:.14em; font-size:13px; }
.brand span{ opacity:.7; font-size:11px; letter-spacing:.18em; text-transform:uppercase; }
.top h1{ font-family:'Space Grotesk'; font-weight:600; font-size:22px; line-height:1.22; margin:14px 0 4px; position:relative; max-width:92%; }
.top p{ font-size:13px; opacity:.85; position:relative; margin:0; }

.steps{ display:flex; gap:6px; margin:18px 0 22px; }
.steps .s{ flex:1; height:4px; border-radius:99px; background:var(--line); transition:.3s; }
.steps .s.on{ background:var(--emerald); }
.steps .s.done{ background:var(--emerald-deep); }

.eyebrow{ font-family:'Space Grotesk'; font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--emerald-deep); }
h2{ font-family:'Space Grotesk'; font-weight:600; font-size:22px; margin:6px 0 4px; }
.lead{ color:var(--ink-soft); font-size:14px; margin:0 0 20px; line-height:1.5; }

label{ display:block; font-weight:600; font-size:13px; margin:18px 0 6px; }
label .opt{ font-weight:500; color:var(--ink-soft); font-size:12px; }
.qnum{ color:var(--emerald-deep); font-family:'Space Grotesk'; margin-right:6px; }
textarea, input[type=text]{ width:100%; border:1.5px solid var(--line); border-radius:12px; background:#fff;
  padding:12px 14px; font-family:'Inter',sans-serif; font-size:14px; color:var(--ink); outline:none; transition:.15s; resize:vertical; }
textarea:focus, input:focus{ border-color:var(--emerald); box-shadow:0 0 0 3px rgba(21,160,119,.14); }
textarea{ min-height:96px; line-height:1.5; }
.hint{ font-size:12px; color:var(--ink-soft); margin-top:6px; }
.hint.err{ color:#b04; }

/* Selección de principio (filtro) */
.prin-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; }
.prin-btn{ border:1.5px solid var(--line); border-radius:12px; padding:12px 10px; background:#fff; cursor:pointer;
  font-family:'Space Grotesk'; font-weight:600; font-size:12px; color:var(--ink-soft); transition:.15s; text-align:center; line-height:1.3; }
.prin-btn:hover{ border-color:var(--emerald); }
.prin-btn.sel{ color:#fff; border-color:transparent; background:var(--emerald); }
.prin-btn .pn{ display:block; font-size:11px; opacity:.7; margin-bottom:2px; }

/* ODSSI list */
.odssi-list{ margin-top:8px; }
.odssi-item{ display:flex; gap:11px; align-items:flex-start; border:1.5px solid var(--line); border-radius:12px;
  padding:12px 13px; margin-top:8px; cursor:pointer; background:#fff; transition:.15s; }
.odssi-item:hover{ border-color:var(--emerald); }
.odssi-item.sel{ border-color:var(--emerald); background:var(--mint); }
.odssi-item.taken{ opacity:.92; }
.odssi-item .nx{ font-family:'Space Grotesk'; font-weight:700; color:var(--emerald-deep); font-size:14px; min-width:18px; }
.odssi-item .tt{ font-size:14px; line-height:1.4; }
.odssi-item .pr{ font-size:11px; color:var(--ink-soft); margin-top:2px; }
.odssi-item .tag{ margin-left:auto; font-size:10px; font-weight:600; padding:2px 7px; border-radius:99px; background:var(--mint); color:var(--emerald-deep); align-self:center; white-space:nowrap; }

/* Actores clave (chips) */
.actor-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.actor-chip{ border:1.5px solid var(--line); border-radius:99px; padding:8px 14px; background:#fff; cursor:pointer;
  font-family:'Space Grotesk'; font-weight:600; font-size:13px; color:var(--ink-soft); transition:.15s; }
.actor-chip:hover{ border-color:var(--emerald); }
.actor-chip.sel{ background:var(--emerald); color:#fff; border-color:transparent; }

.row{ display:flex; gap:10px; margin-top:26px; align-items:center; }
button.btn{ font-family:'Space Grotesk'; font-weight:600; font-size:14px; cursor:pointer; border:none; border-radius:12px; padding:13px 20px; transition:.15s; }
.btn-primary{ background:var(--emerald); color:#fff; }
.btn-primary:hover{ background:var(--emerald-deep); }
.btn-primary:disabled{ background:#9ec9bb; cursor:not-allowed; }
.btn-ghost{ background:transparent; color:var(--ink-soft); border:1.5px solid var(--line); }
.btn-ghost:hover{ border-color:var(--emerald); color:var(--emerald-deep); }
.grow{ flex:1; }

.done{ text-align:center; padding:34px 16px; }
.done .ring{ width:64px; height:64px; border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; background:var(--mint); font-size:28px; }

.foot{ text-align:center; margin-top:30px; }
.foot button{ background:none; border:none; color:var(--ink-soft); font-size:12px; text-decoration:underline; cursor:pointer; font-family:'Inter'; padding:4px; }
.shared-note{ font-size:11px; color:var(--ink-soft); margin-top:10px; text-align:center; }

.op-head{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:6px; flex-wrap:wrap; gap:10px; }
.counter{ font-family:'Space Grotesk'; font-weight:700; font-size:30px; color:var(--emerald-deep); }
.counter span{ font-size:16px; color:var(--ink-soft); font-weight:500; }
table{ width:100%; border-collapse:collapse; margin-top:14px; font-size:13px; }
th{ text-align:left; font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); border-bottom:1.5px solid var(--line); padding:8px 6px; }
td{ border-bottom:1px solid var(--line); padding:9px 6px; vertical-align:top; }
.pill{ font-size:11px; font-weight:600; padding:2px 8px; border-radius:99px; }
.pill.ok{ background:var(--mint); color:var(--emerald-deep); }
.pill.none{ background:#f0f0f0; color:#999; }
.gate{ max-width:340px; margin:40px auto; text-align:center; }
.toast{ font-size:12px; color:var(--emerald-deep); margin-top:8px; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ===== Datos ===== */
const PRINCIPIOS = {
  P1:"Aumento de las protecciones",
  P2:"Experiencia del cliente",
  P3:"Desarrollo sostenible del sector",
  P4:"Cadena de valor de primer nivel",
  P5:"Prevención y gestión de riesgo",
};
const ODSSI = [
  {n:1,p:"P1",t:"Accesibilidad y distribución ética"},
  {n:2,p:"P1",t:"Vida, salud y bienestar"},
  {n:3,p:"P1",t:"Estabilidad económica de PyMEs y emprendedores"},
  {n:4,p:"P2",t:"Indemnización oportuna"},
  {n:5,p:"P2",t:"Productos claros y éticos"},
  {n:6,p:"P3",t:"Educación financiera para la asegurabilidad"},
  {n:7,p:"P3",t:"Distribución equitativa del valor"},
  {n:8,p:"P3",t:"Atraer talento seguro"},
  {n:9,p:"P4",t:"Prevención y detección de fraude"},
  {n:10,p:"P4",t:"Operación end-to-end con IA y Agentic AI"},
  {n:11,p:"P4",t:"Capacidad técnica para absorber riesgos"},
  {n:12,p:"P5",t:"Movilidad responsable y riesgos cotidianos"},
  {n:13,p:"P5",t:"Resiliencia climática y catástrofes naturales"},
  {n:14,p:"P5",t:"Cultura de prevención e iniciativas colectivas"},
  {n:15,p:"P5",t:"Economía circular y reparación"},
];
/* Actores clave de la lámina FARO XXI */
const ACTORES = ["Aseguradora","Insurtechs","Reguladores","Fintechs","Bill. digitales","Retailers"];
const OP_CODE = "faro"; // código de la vista de organizador (configurable)
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbwTE-fOhXmM9H9ASU3hoZ7GxpcvfGca9gLNZVrz4vAEzfmqEqyFfz7SPt3veIaje7h-/exec";

/* ===== Almacenamiento (localStorage + fallback en memoria) ===== */
const store = {
  mem:{},
  load(){ try{ const s=localStorage.getItem("faro_odssi_p2"); this.mem = s?JSON.parse(s):{}; }catch(e){} },
  save(){ try{ localStorage.setItem("faro_odssi_p2", JSON.stringify(this.mem)); }catch(e){} },
  set(rec){ this.mem["env_"+(rec.timestamp||Date.now())+"_"+rec.odssi_num]=rec; this.save(); },
  get(n){ return this.all().find(x=>x.odssi_num===n)||null; },
  all(){ return Object.values(this.mem).sort((a,b)=>a.odssi_num-b.odssi_num); },
  clear(){ this.mem={}; this.save(); }
};
store.load();

/* ===== Estado ===== */
const state = {
  view:"participant", step:0, filtroP:"", odssiN:0,
  raw:{ acciones:"", kpis:"", compromisos:"" },
  actores:[], gateErr:false, toast:"", sending:false
};
const esc = (s)=> (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const odssiObj = ()=> ODSSI.find(o=>o.n===state.odssiN);

/* ===== Acciones ===== */
function selectPrin(p){ state.filtroP = (state.filtroP===p ? "" : p); render(); }
function selectOdssi(n){
  state.odssiN=n;
  render();
}
function go(n){ state.step=n; render(); }
function updRaw(k,v){ state.raw[k]=v; } /* sin re-render para no perder foco */
function toggleActor(a){
  const i=state.actores.indexOf(a);
  if(i>=0) state.actores.splice(i,1); else state.actores.push(a);
  render();
}

function send(){
  if(state.sending) return;
  const r=state.raw;
  if(!r.acciones.trim() && !r.kpis.trim() && state.actores.length===0){
    document.getElementById("sendErr").textContent="Completa al menos una respuesta antes de enviar.";
    return;
  }
  const o=odssiObj();
  const rec={
    odssi_num:o.n, odssi_nombre:o.t, principio:PRINCIPIOS[o.p],
    estado:"enviado",
    respuestas:{
      acciones:r.acciones.trim(),
      kpis:r.kpis.trim(),
      compromisos:r.compromisos.trim()
    },
    actores: state.actores.slice(),
    timestamp:new Date().toISOString()
  };
  store.set(rec); // respaldo local (clave única por timestamp)

  state.sending=true; render();
  // POST a Google Sheets. Apps Script no envía CORS -> usamos no-cors (envío "optimista").
  fetch(ENDPOINT_URL, {
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(rec)
  }).then(()=>{
    state.sending=false; state.step=2; render();
  }).catch(()=>{
    // Si la red falla, el dato queda en localStorage como respaldo
    state.sending=false; state.step=2; render();
  });
}
function reset(){ state.step=0; state.filtroP=""; state.odssiN=0; state.raw={acciones:"",kpis:"",compromisos:""}; state.actores=[]; render(); }

function openGate(){ state.view="gate"; state.gateErr=false; render(); }
function tryGate(){
  const v=(document.getElementById("gateInput").value||"").trim().toLowerCase();
  if(v===OP_CODE){ state.view="operator"; state.gateErr=false; }
  else state.gateErr=true;
  render();
}
function backParticipant(){ state.view="participant"; render(); }

function exportJSON(){ return JSON.stringify(store.all(), null, 2); }
function opDownload(){
  const blob=new Blob([exportJSON()],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="faro_xxi_odssi_acciones.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function opCopy(){
  const txt=exportJSON();
  const done=()=>{ state.toast="✓ JSON copiado"; render(); setTimeout(()=>{state.toast="";render();},1800); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done));
  } else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){
  const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); done(); }catch(e){} document.body.removeChild(ta);
}
function opClear(){ if(confirm("¿Borrar todas las respuestas? (solo para pruebas)")){ store.clear(); render(); } }

/* ===== Render ===== */
function header(){
  return `<div class="top">
    <div class="brand"><span class="beacon"></span><b>FARO XXI &ndash; COLOMBIA</b><span>&middot; Acciones ODSSI</span></div>
    <h1>Construyendo el futuro del sector asegurador</h1>
    <p>Foro Asegurador Regional de Oportunidades para el Siglo XXI</p>
  </div>`;
}
function stepper(){
  let h='<div class="steps">';
  for(let i=0;i<3;i++){ h+=`<div class="s ${state.step===i?'on':(state.step>i?'done':'')}"></div>`; }
  return h+'</div>';
}

function viewParticipant(){
  let body="";
  if(state.step===0){
    /* Filtro por principio (opcional) */
    const prin=Object.keys(PRINCIPIOS).map(p=>{
      const sel=state.filtroP===p;
      return `<button class="prin-btn ${sel?'sel':''}" onclick="selectPrin('${p}')"><span class="pn">${p}</span>${PRINCIPIOS[p]}</button>`;
    }).join("");
    /* Lista de ODSSI (todos; filtrada si hay principio activo) */
    const lista=ODSSI.filter(o=>!state.filtroP || o.p===state.filtroP).map(o=>{
      return `<div class="odssi-item ${state.odssiN===o.n?'sel':''}" onclick="selectOdssi(${o.n})">
        <span class="nx">${o.n}</span>
        <div><span class="tt">${o.t}</span><div class="pr">${o.p} &middot; ${PRINCIPIOS[o.p]}</div></div>
      </div>`;
    }).join("");
    body=`<div class="eyebrow">Paso 1 &middot; Selecciona el ODSSI</div>
      <h2>Elige el ODSSI a trabajar</h2>
      <p class="lead">Cualquier grupo puede seleccionar cualquiera de los 15 ODSSI. Usa el filtro por principio si quieres acotar la lista.</p>
      <label>Filtrar por principio <span class="opt">(opcional)</span></label><div class="prin-grid">${prin}</div>
      <label>ODSSI</label><div class="odssi-list">${lista}</div>
      <div class="row"><button class="btn btn-primary grow" ${state.odssiN?'':'disabled'} onclick="go(1)">Continuar</button></div>`;
  }
  else if(state.step===1){
    const o=odssiObj();
    const chips=ACTORES.map(a=>{
      const sel=state.actores.includes(a);
      return `<button class="actor-chip ${sel?'sel':''}" onclick="toggleActor('${a}')">${a}</button>`;
    }).join("");
    body=`<div class="eyebrow">Paso 2 &middot; ODSSI ${o.n} &middot; ${o.p}</div>
      <h2>${o.t}</h2>
      <p class="lead">Define las acciones, indicadores y actores para este ODSSI.</p>
      <label><span class="qnum">1</span>¿Qué acciones concretas podemos proponer?</label>
      <textarea oninput="updRaw('acciones',this.value)" placeholder="Acciones específicas, medibles y coordinadas...">${esc(state.raw.acciones)}</textarea>
      <label><span class="qnum">2</span>¿Cuáles son los indicadores clave (KPIs) para medir el progreso?</label>
      <textarea oninput="updRaw('kpis',this.value)" placeholder="Ej. % penetración, NPS, tiempo de indemnización...">${esc(state.raw.kpis)}</textarea>
      <label><span class="qnum">3</span>¿Cuáles son los actores clave?</label>
      <div class="actor-grid">${chips}</div>
      <label><span class="qnum">4</span>Compromisos individuales respecto al ODSSI <span class="opt">(opcional)</span></label>
      <textarea oninput="updRaw('compromisos',this.value)" placeholder="¿A qué se compromete cada actor frente a este ODSSI?">${esc(state.raw.compromisos)}</textarea>
      <p class="hint err" id="sendErr"></p>
      <div class="row"><button class="btn btn-ghost" onclick="go(0)" ${state.sending?'disabled':''}>Atrás</button>
        <button class="btn btn-primary grow" onclick="send()" ${state.sending?'disabled':''}>${state.sending?'Enviando…':'Enviar'}</button></div>
      <p class="shared-note">Al enviar, el contenido queda disponible para los organizadores del foro.</p>`;
  }
  else{
    body=`<div class="done"><div class="ring">✓</div>
      <h2>¡Enviado!</h2>
      <p class="lead" style="max-width:380px;margin:0 auto 22px;">El aporte de tu grupo quedó registrado. Pronto lo verán proyectado como lámina.</p>
      <button class="btn btn-ghost" onclick="reset()">Registrar otro ODSSI</button></div>`;
  }
  return header()+stepper()+body+`<div class="foot"><button onclick="openGate()">Vista de organizador</button></div>`;
}

function viewGate(){
  return header()+`<div class="gate">
    <div class="eyebrow">Acceso restringido</div>
    <h2>Vista de organizador</h2>
    <p class="lead">Ingresa el código del foro.</p>
    <input type="text" id="gateInput" placeholder="Código" />
    ${state.gateErr?'<p class="hint err">Código incorrecto.</p>':''}
    <div class="row"><button class="btn btn-ghost" onclick="backParticipant()">Atrás</button>
      <button class="btn btn-primary grow" onclick="tryGate()">Entrar</button></div>
    <p class="hint" style="margin-top:18px;">Código del prototipo: <b>${OP_CODE}</b></p>
  </div>`;
}

function viewOperator(){
  const rows=store.all();
  const tbody=rows.length? rows.map(rec=>{
    return `<tr>
      <td style="font-weight:600;color:var(--emerald-deep)">${rec.odssi_num}</td>
      <td>${esc(rec.odssi_nombre)}</td>
      <td>${rec.actores&&rec.actores.length?esc(rec.actores.join(", ")):'<span style="color:#aaa">—</span>'}</td>
      <td><span class="pill ok">enviado</span></td>
    </tr>`;
  }).join("") : `<tr><td colspan="4" style="color:#aaa;padding:18px 6px;">Sin envíos en este dispositivo. El consolidado real está en Google Sheets.</td></tr>`;
  return header()+`
    <div class="op-head">
      <div><div class="eyebrow">Consola del foro</div><div class="counter">${rows.length}<span> envíos (este dispositivo)</span></div></div>
      <div style="display:flex;gap:8px;"><a class="btn btn-primary" style="text-decoration:none;display:inline-block;" href="${ENDPOINT_URL}" target="_blank" rel="noopener">Ver consolidado (JSON)</a></div>
    </div>
    <p class="lead">Las respuestas de los grupos se guardan en Google Sheets. Abre <b>Ver consolidado</b> para el JSON completo de los 3 grupos, o revisa la hoja directamente. Este JSON alimenta la generación de las láminas FARO XXI.</p>
    <div style="display:flex;gap:8px;margin-bottom:4px;">
      <button class="btn btn-ghost" onclick="opCopy()">Copiar JSON local</button>
      <button class="btn btn-ghost" onclick="opClear()">Borrar datos locales</button></div>
    ${state.toast?`<div class="toast">${state.toast}</div>`:''}
    <table><thead><tr><th>#</th><th>ODSSI</th><th>Actores clave</th><th>Estado</th></tr></thead><tbody>${tbody}</tbody></table>
    <div class="foot"><button onclick="backParticipant()">&larr; Volver a la vista de participante</button></div>`;
}

function render(){
  const el=document.getElementById("app");
  if(state.view==="gate") el.innerHTML=viewGate();
  else if(state.view==="operator") el.innerHTML=viewOperator();
  else el.innerHTML=viewParticipant();
}
render();
</script>
</body>
</html>
